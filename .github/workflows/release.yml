# Auto-release on version bump.
#
# Trigger: any push to main that modifies catalyst-app/package.json. The
# `detect` job reads the version, and if no matching `vX.Y.Z` tag exists yet,
# creates and pushes it. The matrix `build` job then runs and electron-builder
# uploads the .dmg / .exe to a GitHub draft release at that tag.
#
# To cut a release locally:
#   cd catalyst-app && npm version patch && cd ..
#   git push origin main          # the workflow handles the rest
#
# Manual dry-run (build without publishing): Actions tab → Release → Run
# workflow → check Dry run. Useful for verifying changes to the build config
# without burning a tag.

name: Release

on:
  push:
    branches: [main]
    paths:
      - 'catalyst-app/package.json'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only, do not publish'
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # tag + release creation

jobs:
  detect:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.read.outputs.tag }}
      version: ${{ steps.read.outputs.version }}
      should_release: ${{ steps.read.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # we need existing tags to dedupe

      - id: read
        name: Read package.json version
        run: |
          VERSION=$(node -p "require('./catalyst-app/package.json').version")
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # If the tag already exists, this is a re-push of a commit we've
          # already released — skip silently so we don't double-release.
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $TAG"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create + push tag
        if: steps.read.outputs.should_release == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.read.outputs.tag }}" -m "Release ${{ steps.read.outputs.tag }}"
          git push origin "${{ steps.read.outputs.tag }}"

  build:
    name: Build (${{ matrix.os }})
    needs: detect
    # Run when:
    #   - a version bump landed on main (detect created a fresh tag), or
    #   - the workflow was triggered manually (release or dry-run).
    if: needs.detect.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: catalyst-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: catalyst-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run build
          npx electron-builder --publish ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && 'never' || 'always' }}

      - name: Upload artifacts (workflow_dispatch dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@v4
        with:
          name: catalyst-coach-${{ matrix.os }}
          path: |
            catalyst-app/release/*.dmg
            catalyst-app/release/*.exe
            catalyst-app/release/*.blockmap
            catalyst-app/release/*.yml
          if-no-files-found: warn
